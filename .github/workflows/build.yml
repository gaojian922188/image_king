name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: image-king-windows
          path: build/windows/x64/runner/Release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release

      # Fix executable permission and create DMG for easy installation
      - name: Create DMG
        run: |
          chmod +x build/macos/Build/Products/Release/image_king.app/Contents/MacOS/image_king
          hdiutil create -volname "Image King" \
            -srcfolder build/macos/Build/Products/Release/image_king.app \
            -ov -format UDZO \
            image_king.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: image-king-macos
          path: image_king.dmg
